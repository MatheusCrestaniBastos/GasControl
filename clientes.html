<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Clientes — GasMaster</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* Client card grid view */
    .clients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      padding: 20px 22px;
    }
    .client-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 18px;
      transition: all var(--t2) var(--ease);
      cursor: default;
      animation: fadeUp .4s var(--ease) both;
      position: relative;
      overflow: hidden;
    }
    .client-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--brand), transparent);
      opacity: 0;
      transition: opacity var(--t2);
    }
    .client-card:hover {
      border-color: var(--border2);
      background: var(--surface3);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .client-card:hover::before { opacity: 1; }

    .cc-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .cc-ava { width: 44px; height: 44px; font-size: 15px; }
    .cc-name { font-size: 14px; font-weight: 700; color: var(--txt); letter-spacing: -.2px; }
    .cc-doc { font-size: 11.5px; color: var(--txt3); margin-top: 1px; }

    .cc-info { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .cc-row { display: flex; align-items: flex-start; gap: 7px; font-size: 12.5px; color: var(--txt2); }
    .cc-row-ico { font-size: 12px; margin-top: 1px; flex-shrink: 0; opacity: .6; }
    .cc-row-txt { flex: 1; line-height: 1.4; }

    .cc-actions { display: flex; gap: 6px; padding-top: 12px; border-top: 1px solid var(--border); }

    /* Table vs grid toggle */
    .view-toggle { display: flex; gap: 4px; }
    .vt-btn {
      width: 30px; height: 30px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--txt3); font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--t); cursor: pointer;
    }
    .vt-btn.on { background: var(--brand-dim); border-color: rgba(255,107,53,.3); color: var(--brand); }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="mob-overlay" id="mob-overlay"></div>

  <main class="main-content">
    <header class="topbar">
      <div class="tb-left">
        <button class="topbar-icon-btn sidebar-toggle" id="sidebar-toggle">☰</button>
        <div>
          <div class="tb-page-title">Clientes</div>
          <div class="tb-crumb">Gerenciamento de clientes</div>
        </div>
      </div>
      <div class="tb-right">
        <div class="view-toggle">
          <button class="vt-btn on" id="vt-card" onclick="setView('card')" title="Cartões">⊞</button>
          <button class="vt-btn" id="vt-table" onclick="setView('table')" title="Tabela">☰</button>
        </div>
        <button class="btn btn-primary" onclick="openModal()">＋ Novo Cliente</button>
      </div>
    </header>

    <div class="page">
      <!-- Metrics -->
      <div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px;">
        <div class="mcard c-blue">
          <div class="mcard-icon">👥</div>
          <div class="mcard-val" id="mc-total">—</div>
          <div class="mcard-lbl">Total Cadastrados</div>
        </div>
        <div class="mcard c-green">
          <div class="mcard-icon">📦</div>
          <div class="mcard-val" id="mc-ativos">—</div>
          <div class="mcard-lbl">Com Pedidos</div>
        </div>
        <div class="mcard c-brand">
          <div class="mcard-icon">✨</div>
          <div class="mcard-val" id="mc-novos">—</div>
          <div class="mcard-lbl">Novos Este Mês</div>
        </div>
      </div>

      <!-- Card -->
      <div class="card">
        <div class="card-hd">
          <div>
            <div class="card-title">Clientes Cadastrados</div>
            <div class="card-sub" id="clients-count">Carregando...</div>
          </div>
        </div>

        <!-- Search -->
        <div class="search-row">
          <div class="search-wrap">
            <span class="search-ico">🔍</span>
            <input type="text" class="finput" id="search" placeholder="Buscar nome, telefone, endereço..." oninput="onSearch(this.value)"/>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="load(true)">↺ Atualizar</button>
        </div>

        <!-- Content -->
        <div id="content">
          <div class="loading-state"><div class="spinner spinner-lg" style="color:var(--brand)"></div><span>Carregando clientes...</span></div>
        </div>

        <div class="pager" id="pager" style="display:none">
          <div class="pager-info" id="pager-info"></div>
          <div class="pager-btns" id="pager-btns"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL CLIENTE -->
<div class="modal-bg" id="modal-client">
  <div class="modal">
    <div class="modal-hd">
      <div>
        <div class="modal-title" id="modal-title">Novo Cliente</div>
        <div class="modal-sub">Preencha as informações do cliente</div>
      </div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-error" id="m-err"><span>⚠</span><span id="m-err-msg"></span></div>

      <input type="hidden" id="c-id"/>

      <div class="fg">
        <label class="flabel">Nome completo <span class="req">*</span></label>
        <input class="finput" id="c-nome" placeholder="João da Silva"/>
        <div class="ferror" id="err-nome">Nome é obrigatório</div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flabel">Telefone / WhatsApp <span class="req">*</span></label>
          <input class="finput" id="c-tel" placeholder="(49) 99999-9999" oninput="maskPhone(this)"/>
          <div class="ferror" id="err-tel">Telefone obrigatório</div>
        </div>
        <div class="fg">
          <label class="flabel">CPF / CNPJ</label>
          <input class="finput" id="c-doc" placeholder="Opcional"/>
        </div>
      </div>
      <div class="fg">
        <label class="flabel">Endereço <span class="req">*</span></label>
        <input class="finput" id="c-end" placeholder="Rua, número, bairro, cidade"/>
        <div class="ferror" id="err-end">Endereço obrigatório</div>
      </div>
      <div class="fg">
        <label class="flabel">Ponto de referência</label>
        <input class="finput" id="c-ref" placeholder="Próximo ao Mercado X..."/>
      </div>
      <div class="fg">
        <label class="flabel">Observações</label>
        <textarea class="finput" id="c-obs" rows="3" placeholder="Informações adicionais..."></textarea>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="save-btn" onclick="save()">
        <span id="save-txt">💾 Salvar</span>
      </button>
    </div>
  </div>
</div>

<!-- MODAL DETALHE -->
<div class="modal-bg" id="modal-detail">
  <div class="modal" style="max-width:560px">
    <div class="modal-hd">
      <div>
        <div class="modal-title">Detalhes do Cliente</div>
        <div class="modal-sub" id="detail-name">—</div>
      </div>
      <button class="modal-x" onclick="closeModal('modal-detail')">×</button>
    </div>
    <div class="modal-body" id="detail-body">
      <div class="loading-state"><div class="spinner" style="color:var(--brand)"></div></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal('modal-detail')">Fechar</button>
      <button class="btn btn-primary" id="detail-edit-btn">✏ Editar</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="services/supabase.js"></script>
<script>
  let pg = 1, total_pg = 1, q = '', editId = null, viewMode = 'card';
  const PER = 18;

  async function init() {
    await Components.initLayout('clientes','Clientes');
    load();
    loadMetrics();
    const p = new URLSearchParams(window.location.search);
    if (p.get('novo')==='1') openModal();
  }

  async function loadMetrics() {
    try {
      const {data,count} = await ClientesService.listar({limit:9999});
      document.getElementById('mc-total').textContent = count;
      const ini = new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString();
      document.getElementById('mc-novos').textContent = data.filter(c=>c.created_at>=ini).length;
      document.getElementById('mc-ativos').textContent = '—';
    } catch(e){}
  }

  async function load(reset=false) {
    if(reset) pg=1;
    const el = document.getElementById('content');
    if(pg===1) el.innerHTML = `<div class="loading-state"><div class="spinner spinner-lg" style="color:var(--brand)"></div><span>Carregando...</span></div>`;
    try {
      const r = await ClientesService.listar({search:q,page:pg,limit:PER});
      total_pg = r.totalPages||1;
      document.getElementById('clients-count').textContent = `${r.count} cliente${r.count!==1?'s':''} encontrado${r.count!==1?'s':''}`;
      viewMode==='card' ? renderCards(r.data) : renderTable(r.data);
      renderPager(r.count);
    } catch(err) {
      el.innerHTML = `<div class="tbl-empty"><div class="tbl-empty-ico">❌</div><p>${err.message}</p></div>`;
    }
  }

  function renderCards(clients) {
    const el = document.getElementById('content');
    if(!clients.length) {
      el.innerHTML = `<div class="tbl-empty"><div class="tbl-empty-ico">👥</div><p>${q?'Nenhum cliente encontrado.':'Nenhum cliente cadastrado ainda.'}</p><button class="btn btn-primary btn-sm" style="margin-top:14px" onclick="openModal()">Cadastrar primeiro cliente</button></div>`;
      return;
    }
    el.innerHTML = `<div class="clients-grid">${clients.map((c,i)=>`
      <div class="client-card" style="animation-delay:${i*.04}s">
        <div class="cc-top">
          <div class="avatar cc-ava">${Utils.initials(c.nome)}</div>
          <div>
            <div class="cc-name">${c.nome}</div>
            <div class="cc-doc">${c.documento||'&nbsp;'}</div>
          </div>
        </div>
        <div class="cc-info">
          <div class="cc-row"><span class="cc-row-ico">📱</span><span class="cc-row-txt">${Utils.formatPhone(c.telefone)}</span></div>
          <div class="cc-row"><span class="cc-row-ico">📍</span><span class="cc-row-txt">${c.endereco||'—'}</span></div>
          ${c.referencia?`<div class="cc-row"><span class="cc-row-ico">🗺</span><span class="cc-row-txt">${c.referencia}</span></div>`:''}
        </div>
        <div class="cc-actions">
          <a href="https://wa.me/55${c.telefone?.replace(/\D/g,'')||''}" target="_blank" class="btn btn-success btn-sm" style="flex:1;justify-content:center;">💬 WhatsApp</a>
          <button class="btn btn-ghost btn-sm" onclick="openModal('${c.id}')" title="Editar">✏</button>
          <button class="btn btn-danger btn-sm" onclick="del('${c.id}','${c.nome.replace(/'/g,"\\'")}')">🗑</button>
        </div>
      </div>
    `).join('')}</div>`;
  }

  function renderTable(clients) {
    const el = document.getElementById('content');
    if(!clients.length){
      el.innerHTML=`<div class="tbl-empty"><div class="tbl-empty-ico">👥</div><p>Nenhum cliente.</p></div>`;
      return;
    }
    el.innerHTML=`<div class="tbl-wrap"><table>
      <thead><tr><th>Cliente</th><th>Telefone</th><th>Endereço</th><th>Cadastro</th><th>Ações</th></tr></thead>
      <tbody>${clients.map(c=>`<tr>
        <td><div style="display:flex;align-items:center;gap:10px">
          <div class="avatar" style="width:32px;height:32px;font-size:12px">${Utils.initials(c.nome)}</div>
          <div><div style="font-weight:600">${c.nome}</div>${c.documento?`<div style="font-size:11px;color:var(--txt3)">${c.documento}</div>`:''}</div>
        </div></td>
        <td><a href="https://wa.me/55${c.telefone?.replace(/\D/g,'')||''}" target="_blank" style="color:var(--emerald);font-size:13px">📱 ${Utils.formatPhone(c.telefone)}</a></td>
        <td style="font-size:13px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.endereco||'—'}</td>
        <td style="font-size:12px;color:var(--txt3)">${Utils.formatDateShort(c.created_at)}</td>
        <td><div class="td-actions">
          <button class="btn btn-ghost btn-sm" onclick="detail('${c.id}')">👁</button>
          <button class="btn btn-ghost btn-sm" onclick="openModal('${c.id}')">✏</button>
          <button class="btn btn-danger btn-sm" onclick="del('${c.id}','${c.nome.replace(/'/g,"\\'")}')">🗑</button>
        </div></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  function renderPager(count) {
    const pg_el = document.getElementById('pager');
    if(count<=PER){pg_el.style.display='none';return;}
    pg_el.style.display='flex';
    const from=(pg-1)*PER+1, to=Math.min(pg*PER,count);
    document.getElementById('pager-info').textContent=`${from}–${to} de ${count}`;
    let h=`<button class="pager-btn" onclick="goPage(${pg-1})" ${pg===1?'disabled':''}>‹</button>`;
    for(let i=1;i<=total_pg;i++){
      if(i===1||i===total_pg||Math.abs(i-pg)<=1) h+=`<button class="pager-btn ${i===pg?'on':''}" onclick="goPage(${i})">${i}</button>`;
      else if(Math.abs(i-pg)===2) h+=`<span style="color:var(--txt3);padding:0 2px">…</span>`;
    }
    h+=`<button class="pager-btn" onclick="goPage(${pg+1})" ${pg===total_pg?'disabled':''}>›</button>`;
    document.getElementById('pager-btns').innerHTML=h;
  }

  function goPage(p){if(p<1||p>total_pg)return;pg=p;load();window.scrollTo({top:0,behavior:'smooth'});}

  const onSearch = Utils.debounce(v=>{q=v;load(true);},400);

  function setView(v) {
    viewMode=v;
    document.getElementById('vt-card').classList.toggle('on',v==='card');
    document.getElementById('vt-table').classList.toggle('on',v==='table');
    load();
  }

  // ---- MODAL ----
  async function openModal(id=null) {
    editId=id;
    clearForm();
    document.getElementById('modal-title').textContent=id?'Editar Cliente':'Novo Cliente';
    document.getElementById('save-txt').textContent=id?'💾 Atualizar':'💾 Salvar';
    if(id){
      try {
        const c=await ClientesService.buscarPorId(id);
        document.getElementById('c-id').value=c.id;
        document.getElementById('c-nome').value=c.nome||'';
        document.getElementById('c-tel').value=Utils.formatPhone(c.telefone)||'';
        document.getElementById('c-doc').value=c.documento||'';
        document.getElementById('c-end').value=c.endereco||'';
        document.getElementById('c-ref').value=c.referencia||'';
        document.getElementById('c-obs').value=c.observacoes||'';
      } catch(e){Utils.toast('error','Erro',e.message);return;}
    }
    openMod('modal-client');
  }

  function clearForm(){
    ['c-id','c-nome','c-tel','c-doc','c-end','c-ref','c-obs'].forEach(i=>{const e=document.getElementById(i);if(e)e.value='';});
    document.querySelectorAll('#modal-client .finput').forEach(e=>e.classList.remove('invalid'));
    document.getElementById('m-err').classList.remove('show');
  }

  async function save(){
    let ok=true;
    [['c-nome','err-nome'],['c-tel','err-tel'],['c-end','err-end']].forEach(([f])=>{
      const e=document.getElementById(f);
      if(!e.value.trim()){e.classList.add('invalid');ok=false;}
      else e.classList.remove('invalid');
    });
    if(!ok) return;
    const btn=document.getElementById('save-btn');
    btn.disabled=true;btn.innerHTML='<div class="spinner" style="color:#fff"></div>';
    const p={
      nome:document.getElementById('c-nome').value.trim(),
      telefone:document.getElementById('c-tel').value.replace(/\D/g,''),
      documento:document.getElementById('c-doc').value.trim()||null,
      endereco:document.getElementById('c-end').value.trim(),
      referencia:document.getElementById('c-ref').value.trim()||null,
      observacoes:document.getElementById('c-obs').value.trim()||null
    };
    try {
      if(editId) await ClientesService.atualizar(editId,p); else await ClientesService.criar(p);
      Utils.toast('success',editId?'Cliente atualizado!':'Cliente cadastrado!',p.nome);
      closeModal();load(true);loadMetrics();
    } catch(err){
      const e=document.getElementById('m-err');
      document.getElementById('m-err-msg').textContent=err.message;
      e.classList.add('show');
    } finally {
      btn.disabled=false;btn.innerHTML=`<span id="save-txt">${editId?'💾 Atualizar':'💾 Salvar'}</span>`;
    }
  }

  // ---- DETAIL ----
  async function detail(id){
    openMod('modal-detail');
    document.getElementById('detail-body').innerHTML='<div class="loading-state"><div class="spinner" style="color:var(--brand)"></div></div>';
    try {
      const c=await ClientesService.buscarPorId(id);
      const {data:peds,count}=await PedidosService.listar({clienteId:id,limit:5});
      const fat=peds.filter(p=>p.status==='entregue').reduce((a,p)=>a+(p.valor_total||0),0);
      document.getElementById('detail-name').textContent=c.nome;
      document.getElementById('detail-body').innerHTML=`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:14px">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px">Pedidos</div>
            <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--blue)">${count}</div>
          </div>
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:14px">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px">Faturado</div>
            <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--emerald)">${Utils.formatCurrency(fat)}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
          <div style="display:flex;gap:10px"><span style="font-size:14px">📱</span><div><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3)">Telefone</div><div style="font-size:13.5px;margin-top:1px">${Utils.formatPhone(c.telefone)}</div></div></div>
          <div style="display:flex;gap:10px"><span style="font-size:14px">📍</span><div><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3)">Endereço</div><div style="font-size:13.5px;margin-top:1px">${c.endereco||'—'}</div></div></div>
          ${c.referencia?`<div style="display:flex;gap:10px"><span style="font-size:14px">🗺</span><div><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3)">Referência</div><div style="font-size:13.5px;margin-top:1px">${c.referencia}</div></div></div>`:''}
          ${c.observacoes?`<div style="display:flex;gap:10px"><span style="font-size:14px">📝</span><div><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3)">Observações</div><div style="font-size:13px;margin-top:1px;color:var(--txt2)">${c.observacoes}</div></div></div>`:''}
        </div>
        ${peds.length?`<div style="border-top:1px solid var(--border);padding-top:14px;margin-bottom:12px">
          <div style="font-size:12px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Últimos pedidos</div>
          ${peds.map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
            <span class="mono" style="font-size:12px;color:var(--txt3)">${p.numero}</span>
            <span style="font-size:13px;font-weight:600">${Utils.formatCurrency(p.valor_total)}</span>
            ${Utils.statusBadge(p.status)}
          </div>`).join('')}
        </div>`:''}
        <a href="https://wa.me/55${c.telefone?.replace(/\D/g,'')||''}" target="_blank" class="btn btn-success btn-xl btn-w">💬 Abrir WhatsApp</a>`;
      document.getElementById('detail-edit-btn').onclick=()=>{closeModal('modal-detail');openModal(id);};
    } catch(err){document.getElementById('detail-body').innerHTML=`<p style="color:var(--rose)">${err.message}</p>`;}
  }

  async function del(id,nome){
    const ok=await Utils.confirm('Excluir cliente',`Remover "${nome}"? Esta ação não pode ser desfeita.`);
    if(!ok) return;
    try{await ClientesService.excluir(id);Utils.toast('success','Removido!',nome);load(true);loadMetrics();}
    catch(err){Utils.toast('error','Erro ao excluir',err.message);}
  }

  function openMod(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden';}
  function closeModal(id='modal-client'){document.getElementById(id).classList.remove('open');document.body.style.overflow='';}
  document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',function(e){if(e.target===this)closeModal(this.id);}));

  function maskPhone(el){
    let v=el.value.replace(/\D/g,'');
    if(v.length<=10) v=v.replace(/(\d{2})(\d{4})(\d{0,4})/,'($1) $2-$3');
    else v=v.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1) $2-$3');
    el.value=v;
  }

  init();
</script>
</body>
</html>
